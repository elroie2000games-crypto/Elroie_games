<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>איקס עיגול</title>

	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div class="background"></div>

	<div class="container">

		<h1>⭕ איקס עיגול ❌</h1>

		<div id="menu">

			<h2>בחר רמת קושי</h2>

			<div class="buttons">

				<button class="difficulty easy" onclick="startGame('easy')">
					😊 קל
				</button>

				<button class="difficulty medium" onclick="startGame('medium')">
					😎 בינוני
				</button>

				<button class="difficulty hard" onclick="startGame('hard')">
					🔥 קשה
				</button>

			</div>

		</div>

		<div id="game" class="hidden">

			<div class="top">

				<div id="status">
					התור שלך (❌)
				</div>

				<button id="restart" onclick="restartGame()">
					🔄 משחק חדש
				</button>

			</div>

			<div id="board">

				<div class="cell" data-index="0"></div>
				<div class="cell" data-index="1"></div>
				<div class="cell" data-index="2"></div>

				<div class="cell" data-index="3"></div>
				<div class="cell" data-index="4"></div>
				<div class="cell" data-index="5"></div>

				<div class="cell" data-index="6"></div>
				<div class="cell" data-index="7"></div>
				<div class="cell" data-index="8"></div>

			</div>

		</div>

		<div id="popup" class="popup hidden">

			<h2 id="popupText"></h2>

			<button onclick="restartGame()">
				שחק שוב
			</button>

			<button onclick="backToMenu()">
				בחירת רמה
			</button>

		</div>

	</div>

	<script src="script.js"></script>

</body>

</html>
